<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .contact-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            animation: slideIn 0.8s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 32px;
            color: #00eaff;
            letter-spacing: 1px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        input,
        textarea {
            background: transparent;
            border: 2px solid #00eaff;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            color: #fff;
            transition: 0.3s;
        }

        input::placeholder,
        textarea::placeholder {
            color: #ccc;
        }

        input:focus,
        textarea:focus {
            background-color: rgba(0, 234, 255, 0.05);
            outline: none;
            box-shadow: 0 0 10px #00eaff;
            border-color: #00eaff;
        }

        button {
            padding: 14px;
            background: linear-gradient(to right, #00eaff, #007bff);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: linear-gradient(to right, #00bcd4, #0056b3);
            transform: scale(1.02);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 18px;
            padding: 12px 25px;
            border-radius: 25px;
            background: linear-gradient(to right, #00eaff, #007bff);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: background 0.3s, transform 0.3s;
        }

        .back-link:hover {
            background: linear-gradient(to right, #00bcd4, #0056b3);
            transform: translateY(-3px);
        }
    </style>
</head>

<body>
    <div class="contact-container">
        <h2>Contact Us</h2>

        <form id="contactForm" action="mailto:your-email@example.com" method="post" enctype="text/plain">
            <input type="text" name="name" placeholder="Your Name" required />
            <input type="email" name="email" placeholder="Your Email" required />
            <input type="text" name="subject" placeholder="Subject" required />
            <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>

        <br />
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        document.getElementById("contactForm").addEventListener("submit", function (e) {
            alert("Thank you! Your message will now be processed.");
        });
    </script>
</body>

</html>
